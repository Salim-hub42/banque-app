<div class="flex justify-content-end">
  <p-button label="Ajouter un compte" icon="pi pi-plus" (onClick)="ouvrirDialog()" />
</div>

@if (error()) {
   <p class="p-error">Erreur de chargement.</p>
}

<p-table [value]="comptes()" [loading]="isLoading()">
  <ng-template pTemplate="header">
    <tr>
      <th>IBAN</th>
      <th>Type</th>
      <th>Solde</th>
      <th>Statut</th>
      <th>Date d'ouverture</th>
      <th>Actions</th> 
    </tr>
  </ng-template>

   <ng-template pTemplate="body" let-compte>
    <tr>
      <td>{{ asCompte(compte).iban | formatIban}}</td>
      <td>{{ asCompte(compte).type }}</td>
      <td>{{ compte.solde | formatSolde }}</td>
      <td>
       <p-tag 
          [value]="compte.statut"
          [severity]="severiteStatut(compte.statut)">
       </p-tag>
      </td>
      <td>{{ compte.dateOuverture }}</td>
      <td class="flex gap-2">
        <p-button (onClick)="confirmerChangement(compte ,'suspendu')" size="small" [disabled]="compte.statut === 'cloture'">Suspendre</p-button>
        <p-button (onClick)="confirmerChangement(compte ,'cloture')" size="small" [disabled]="compte.statut === 'cloture'">Clôturer</p-button>
      </td>
    </tr>
  </ng-template>
 
</p-table>
 <p-confirmDialog />

 
  <p-dialog
  header="Nouveau Compte"
  [(visible)]="dialogOuvert"
  [modal]="true"
  [style]="{ width: '500px' }"
  [draggable]="false"
  
>

<form [formRoot]="formCompte" ngNoForm>
<p-select
appendTo="body"
 [options]="clients()"
 optionLabel="nom"
 optionValue="id"
 [ngModel]="formCompte.clientId().value()"
 (ngModelChange)="formCompte.clientId().value.set($event)"
 placeholder="Sélectionner un client"
 class="w-full"
/>




</form>







 </p-dialog>
