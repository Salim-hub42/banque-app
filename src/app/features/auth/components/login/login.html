<div class="flex align-items-center justify-content-center min-h-screen bg-login">

  <div class="login-card surface-card border-round-xl shadow-4 p-5">

    <div class="text-center mb-5">
      <div class="logo-circle mb-3">
        <i class="pi pi-building-columns" style="font-size: 2rem; color: var(--boa-red)"></i>
      </div>
      <h1 class="text-2xl font-bold m-0" style="color: var(--boa-navy)">BanqueApp</h1>
      <p class="text-color-secondary mt-1 mb-0">Connectez-vous à votre espace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="field mb-4">
        <label for="email" class="block font-medium mb-2">Email</label>
        <input id="email" pInputText formControlName="email" type="email" class="w-full" />
        <small class="invalid-feedback">Email valide requis</small>
      </div>

      <div class="field mb-4">
        <label for="password" class="block font-medium mb-2">Mot de passe</label>
        <p-password inputId="password" class="w-full" inputStyleClass="w-full" formControlName="password" [feedback]="false" />
        <small class="invalid-feedback">Le mot de passe est requis (min 6 carac.)</small>
      </div>

      <p-button type="submit" label="Se connecter" styleClass="w-full btn-primary mt-2" />

    </form>

  </div>

</div>
